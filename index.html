<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个网页</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="card">
      <div class="emoji">🚀</div>
      <h1>你好，Git！</h1>
      <p>这是我的第一个网页，现在它已经发布到互联网上了!</p>
      <p>这个网页展示了 HTML、CSS 和 JavaScript 的基础应用。</p>

      <div class="features">
        <h2>✨ 功能特性</h2>
        <ul>
          <li>响应式设计，适配各种屏幕尺寸</li>
          <li>流畅的动画效果</li>
          <li>交互式按钮功能</li>
          <li>现代化的渐变背景</li>
          <li>优雅的卡片式布局</li>
        </ul>
      </div>

      <div id="counter">0</div>

      <div class="button-group">
        <button class="btn-primary" onclick="showMessage()">显示消息</button>
        <button class="btn-secondary" onclick="toggleCounter()">计数器</button>
        <button class="btn-danger" onclick="changeEmoji()">切换表情</button>
      </div>

      <div id="message"></div>

      <div class="footer">
        <p>Created with ❤️ | 学习编程的第一步</p>
        <p style="margin-top: 8px;">© 2026 My First Website</p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
